<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Exam</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fas fa-steering-wheel"></i>
            <span>Driving <b>Exam</b></span>
        </div>

        <button class="logout-top" onclick="logout()">
            <i class="fas fa-right-from-bracket"></i>
            Logout
        </button>
    </header>

    <!-- Main Section -->
    <div class="hero">

        <!-- Left Side -->
        <div class="left-content">

            <div class="welcome">
                👋 Welcome Back
            </div>

            <h1>
                Ready to ace your <br>
                <span>Driving Exam?</span>
            </h1>

            <p>
                Choose an option to start your journey.
                Good luck and drive safe!
            </p>

            <div class="stats">

                <div class="stat-box">
                    <i class="fas fa-file-lines"></i>
                    <h2 id="examsTaken">0</h2>
                    <p>Exams Taken</p>
                </div>

                <div class="stat-box">
                    <i class="fas fa-chart-line"></i>
                    <h2 id="averageScore">0%</h2>
                    <p>Avg. Score</p>
                </div>

                <div class="stat-box">
                    <i class="fas fa-trophy"></i>
                   <h2 id="bestScore">0</h2>
                    <p>Best Score</p>
                </div>

            </div>

        </div>

        <!-- Right Side -->
        <div class="right-content">

            <div class="action-card green" onclick="goExam()">
                <div class="icon">
                    <i class="fas fa-file-lines"></i>
                </div>

                <div class="text">
                    <h2>Exam</h2>
                    <p>Take a timed exam and test your skills</p>
                </div>

                <i class="fas fa-arrow-right arrow"></i>
            </div>

            <div class="action-card blue" onclick="goPractice()">
                <div class="icon">
                    <i class="fas fa-book-open"></i>
                </div>

                <div class="text">
                    <h2>Practice</h2>
                    <p>Practice questions to improve</p>
                </div>

                <i class="fas fa-arrow-right arrow"></i>
            </div>

            <div class="action-card purple" onclick="logout()">
                <div class="icon">
                    <i class="fas fa-right-from-bracket"></i>
                </div>

                <div class="text">
                    <h2>Logout</h2>
                    <p>Sign out from your account</p>
                </div>

                <i class="fas fa-arrow-right arrow"></i>
            </div>

        </div>

    </div>

</div>

<script src="js/main.js"></script>

</body>
</html>
